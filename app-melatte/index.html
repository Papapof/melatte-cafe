<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.13/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Cafetería Me Latte - Registro de Ventas</title>
</head>
<body style="background-color: #f5f5dc;">
    <header class="shadow bg-white">
        <div class="header-content d-flex justify-content-center p-3">
            <h2 class="text-dark">Cafetería Me Latte - Registro Diario</h2>
        </div>
    </header>

    <div class="form-container mt-5">
        <form class="w-50 mx-auto" id="saleForm">
            <h5 class="text-center mb-4">Añadir Venta</h5>
            <div class="form-group">
                <label for="product">Producto:</label>
                <select class="form-control rounded-0 shadow-sm" id="product">
                    <option value="">Seleccione un producto</option>
                    <optgroup label="Bebidas Calientes">
                        <option value="Espresso" data-price="1900">Espresso - $1.900</option>
                        <option value="Americano" data-price="2100">Americano - $2.100</option>
                        <option value="Cappuccino" data-price="2500">Cappuccino - $2.500</option>
                        <option value="Latte" data-price="3000">Latte - $3.000</option>
                        <option value="Mocaccino" data-price="3500">Mocaccino - $3.500</option>
                        <option value="Flat White" data-price="2800">Flat White - $2.800</option>
                        <option value="Chocolate Clásico" data-price="3000">Chocolate Clásico - $3.000</option>
                        <option value="Té de la Casa" data-price="2000">Té de la Casa - $2.000</option>
                    </optgroup>
                    <optgroup label="Bebidas Frías">
                        <option value="Latte Frío" data-price="3200">Latte Frío - $3.200</option>
                        <option value="Frapuccino" data-price="3900">Frapuccino - $3.900</option>
                        <option value="Té Helado" data-price="2500">Té Helado - $2.500</option>
                    </optgroup>
                    <optgroup label="Repostería">
                        <option value="Galleta Pequeña" data-price="800">Galleta Pequeña - $800</option>
                        <option value="Galleta Media" data-price="1000">Galleta Media - $1.000</option>
                        <option value="Galleta Grande" data-price="2000">Galleta Grande - $2.000</option>
                        <option value="Pan de Pascua Ind." data-price="1500">Pan de Pascua Ind. - $1.500</option>
                        <option value="Alfajoreo" data-price="800">Alfajoreo - $800</option>
                    </optgroup>
                    <optgroup label="Extras">
                        <option value="Leche" data-price="500">Leche - $500</option>
                        <option value="Syrup" data-price="500">Syrup - $500</option>
                        <option value="Carga de Espresso" data-price="1000">Carga de Espresso - $1.000</option>
                    </optgroup>
                    <optgroup label="Otros">
                        <option value="Agua Mineral" data-price="1000">Agua Mineral - $1.000</option>
                        <option value="Bebida 350cc" data-price="1500">Bebida 350cc - $1.500</option>
                    </optgroup>
                    <option value="Otro">Otro (precio manual)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">Precio:</label>
                <input type="number" class="form-control rounded-0 shadow-sm" id="price" placeholder="0" required>
            </div>
            <div class="form-group">
                <label for="paymentMethod">Método de Pago:</label>
                <select class="form-control rounded-0 shadow-sm" id="paymentMethod">
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="consumo personal">Consumo Personal</option>
                </select>
            </div>
            <div class="form-group">
                <label for="employee">Encargado:</label>
                <select class="form-control rounded-0 shadow-sm" id="employee">
                    <option value="MELATTE">MELATTE</option>
                    <option value="S&C">S&C</option>
                </select>
            </div>
            <button type="submit" class="btn btn-dark mx-auto d-block mt-4 rounded-0 shadow">Añadir Venta</button>
        </form>
    </div>

    <div class="table-container mt-5 mb-5 w-75 mx-auto">
        <h5 class="text-center mb-3">Ventas del Día (<span id="saleCount">0</span>)</h5>
        <table class="table table-striped shadow" id="salesTable">
            <thead class="bg-dark text-white">
                <tr>
                    <th>Producto</th>
                    <th>Método de Pago</th>
                    <th>Precio</th>
                    <th>Encargado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="initial-cash-container mt-4 w-50 mx-auto">
            <label for="initialCash">Dinero al inicio del día:</label>
            <input type="number" class="form-control rounded-0 shadow-sm" id="initialCash" placeholder="0">
        </div>

        <div class="mt-4 text-center">
            <button id="saveList" class="btn btn-success mx-3 px-5">Guardar en PDF</button>
            <button id="clearList" class="btn btn-danger mx-3 px-5">Limpiar Todo</button>
        </div>
    </div>

    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
