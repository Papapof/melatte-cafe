<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.13/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>App de Estacionamiento Halcon</title>
</head>
<body style="background-color:lightgreen;">
    <header class="shadow">
        <div class="header-content d-flex justify-content-center p-2">
            <div id="header-msg" class="ml-5 align-self-center">Aplicacion de Estacionamiento Halcon</div>
        </div>
    </header>
    <div class="form-container mt-5">
        <form class="w-50 mx-auto" id="entryForm">
            <h5 class="text-center">Anadir autos</h5>
            <div class="form-group">
                <label for="licensePlate">Placa de Licencia:</label>
                <input type="text" class="form-control rounded-0 shadow-sm" id="licensePlate" placeholder="XX-XX-XX">
            </div>
            <div class="form-group">
                <label for="entryTime">Hora de entrada:</label>
                <input type="time" class="form-control rounded-0 shadow-sm" id="entryTime">
            </div>
            <div class="form-group">
                <label for="vehicleSize">Tamaño de vehículo:</label>
                <select class="form-control rounded-0 shadow-sm" id="vehicleSize">
                    <option value="normal">Normal</option>
                    <option value="grande">Grande</option>
                </select>
            </div>
            <button type="submit" style="color:#000;" class="btn mx-auto d-block mt-5 rounded-0 shadow" id="btnOne">Add Car</button>
        </form>
    </div>
    <div class="table-container mt-5 mb-5 w-75 mx-auto">
        <h5 class="text-center mb-3">Lista de autos (<span id="carCount">0</span>)</h5>
        <input type="text" class="w-100 mb-3" id="searchInput" placeholder="Search...">
        <table class="table table-striped shadow" id="parkingTable">
            <thead class="text-black" id="tableHead">
                <tr>
                    <th scope="col">Placa de Licencia</th>
                    <th scope="col">Hora de entrada</th>
                    <th scope="col">Hora de salida</th>
                    <th scope="col">Duración (minutos)</th>
                    <th scope="col">Monto a pagar</th>
                    <th scope="col">Pago Tarjeta</th>
                    <th scope="col">Pago Efectivo</th>
                    <th scope="col">Nro Recibo</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="turno-select mt-3 w-50 mx-auto">
            <label for="turno">Turno:</label>
            <select class="form-control" id="turno">
                <option value="07.00 A 15.00">07.00 A 15.00</option>
                <option value="15.00 A 20.00">15.00 A 20.00</option>
            </select>
            <div class="initial-cash-container mt-3">
                <label for="initialCash">Dinero al inicio del turno:</label>
                <input type="number" class="form-control rounded-0 shadow-sm" id="initialCash" placeholder="0">
            </div>
        </div>
        <button id="saveList" class="btn btn-success mt-3">Guardar Lista</button>
        <button id="clearList" class="btn btn-danger mt-3">Limpiar Lista</button>
        <button id="transactionBtn" class="btn btn-primary mt-3">Retiro/Ingreso</button>
        <div id="transactionSection" style="display: none;">
            <h5 class="text-center mt-5 mb-3">Transacciones</h5>
            <table class="table table-striped shadow" id="transactionTable">
                <thead class="text-black">
                    <tr>
                        <th scope="col">Tipo</th>
                        <th scope="col">Monto</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
            </table>
        </div>
    </div>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
