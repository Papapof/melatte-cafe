<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Mensual de Ingresos y Retiros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        input[type="number"], input[type="date"], input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 4px;
        }
        .calculated {
            background-color: #f9f9f9;
            font-weight: bold;
        }
        #summary {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0f8ff;
            border: 1px solid #b3d4fc;
            border-radius: 6px;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
        }
        .removeRow {
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .removeRow:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <h1>Registro Diario de Ingresos y Retiros</h1>

    <form id="registroForm">
        <table id="registroTable">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Ingreso</th>
                    <th>Retiro Jose</th>
                    <th>Retiro Alejandro</th>
                    <th>Retiro Total</th>
                    <th>Motivo</th>
                    <th>Total Acumulado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <!-- Las filas se agregan aquí -->
            </tbody>
        </table>

        <div style="margin-top: 15px;">
            <button type="button" id="addRow">+ Agregar fila</button>
            <button type="button" id="deleteAll">Eliminar todo</button>
            <button type="button" id="exportPDF">Exportar a PDF</button>
        </div>
    </form>

    <div id="summary">
        <h3>Resumen</h3>
        <p>Total Ingresado: <span id="totalIngresado">0.00</span></p>
        <p>Total Retiro Jose: <span id="totalRetiroJose">0.00</span></p>
        <p>Total Retiro Alejandro: <span id="totalRetiroAlejandro">0.00</span></p>
        <p>Total Retiro Ambos: <span id="totalRetiroAmbos">0.00</span></p>
    </div>

    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script>
        const { jsPDF } = window.jspdf;

        const tableBody = document.querySelector('#registroTable tbody');
        const addRowBtn = document.getElementById('addRow');
        const deleteAllBtn = document.getElementById('deleteAll');
        const exportPDFBtn = document.getElementById('exportPDF');

        const totalIngresadoEl    = document.getElementById('totalIngresado');
        const totalRetiroJoseEl   = document.getElementById('totalRetiroJose');
        const totalRetiroAlejandroEl = document.getElementById('totalRetiroAlejandro');
        const totalRetiroAmbosEl  = document.getElementById('totalRetiroAmbos');

        const STORAGE_KEY = 'registro-diario-jose-alejandro-v1';

        // ────────────────────────────────────────────────
        // Crear una fila nueva (vacía)
        // ────────────────────────────────────────────────
        function createEmptyRow() {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="date" required></td>
                <td><input type="number" min="0" value="0" class="input-data ingreso"></td>
                <td><input type="number" min="0" value="0" class="input-data retiro-jose"></td>
                <td><input type="number" min="0" value="0" class="input-data retiro-alejandro"></td>
                <td class="calculated retiroTotal">0.00</td>
                <td><input type="text" placeholder="Motivo..."></td>
                <td class="calculated totalAcumulado">0.00</td>
                <td><button type="button" class="removeRow">Eliminar</button></td>
            `;

            // Listeners para guardar y recalcular
            row.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', () => {
                    updateCalculations();
                    saveToLocalStorage();
                });
                input.addEventListener('change', saveToLocalStorage);
            });

            row.querySelector('.removeRow').addEventListener('click', () => {
                row.remove();
                updateCalculations();
                saveToLocalStorage();
            });

            return row;
        }

        // ────────────────────────────────────────────────
        // Cargar datos guardados al iniciar
        // ────────────────────────────────────────────────
        function loadSavedData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return;

            try {
                const registros = JSON.parse(saved);
                tableBody.innerHTML = '';

                registros.forEach(reg => {
                    const row = createEmptyRow();
                    tableBody.appendChild(row);

                    row.querySelector('input[type="date"]').value = reg.fecha || '';
                    row.querySelector('.ingreso').value = reg.ingreso || '0';
                    row.querySelector('.retiro-jose').value = reg.retiroJose || '0';
                    row.querySelector('.retiro-alejandro').value = reg.retiroAlejandro || '0';
                    row.querySelector('input[type="text"]').value = reg.motivo || '';
                });

                updateCalculations();
            } catch (err) {
                console.error("Error al cargar datos guardados", err);
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        // ────────────────────────────────────────────────
        // Modelo de datos de cada registro
        // ────────────────────────────────────────────────
        // Cada fila representa un registro guardado como objeto:
        // { fecha, ingreso, retiroJose, retiroAlejandro, motivo }
        // Estos objetos se serializan a JSON y se guardan en localStorage.
        function saveToLocalStorage() {
            const data = [];
            tableBody.querySelectorAll('tr').forEach(row => {
                data.push({
                    fecha:           row.querySelector('input[type="date"]').value,
                    ingreso:         row.querySelector('.ingreso').value,
                    retiroJose:      row.querySelector('.retiro-jose').value,
                    retiroAlejandro: row.querySelector('.retiro-alejandro').value,
                    motivo:          row.querySelector('input[type="text"]').value
                });
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ────────────────────────────────────────────────
        // Recalcular totales y acumulados
        // ────────────────────────────────────────────────
        // Esta función actualiza los valores de la tabla basada en los datos actuales
        // de cada fila y mantiene los totales visibles en el resumen.
        function updateCalculations() {
            let acumulado = 0;
            let totIngreso = 0;
            let totJose = 0;
            let totAlejandro = 0;

            tableBody.querySelectorAll('tr').forEach(row => {
                const ingreso = Number(row.querySelector('.ingreso').value) || 0;
                const rJose   = Number(row.querySelector('.retiro-jose').value) || 0;
                const rAlej   = Number(row.querySelector('.retiro-alejandro').value) || 0;
                const retiroTotal = rJose + rAlej;

                acumulado += ingreso - retiroTotal;

                row.querySelector('.retiroTotal').textContent    = retiroTotal.toFixed(2);
                row.querySelector('.totalAcumulado').textContent = acumulado.toFixed(2);

                totIngreso    += ingreso;
                totJose       += rJose;
                totAlejandro  += rAlej;
            });

            totalIngresadoEl.textContent       = totIngreso.toFixed(2);
            totalRetiroJoseEl.textContent      = totJose.toFixed(2);
            totalRetiroAlejandroEl.textContent = totAlejandro.toFixed(2);
            totalRetiroAmbosEl.textContent     = (totJose + totAlejandro).toFixed(2);
        }

        // ────────────────────────────────────────────────
        // Exportar a PDF
        // ────────────────────────────────────────────────
        function exportToPDF() {
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("Registro Diario de Ingresos y Retiros", 14, 20);

            const headers = [
                'Fecha', 'Ingreso', 'Retiro Jose', 'Retiro Alejandro',
                'Retiro Total', 'Motivo', 'Total Acumulado'
            ];

            const body = [];
            tableBody.querySelectorAll('tr').forEach(row => {
                body.push([
                    row.querySelector('input[type="date"]').value || '',
                    row.querySelector('.ingreso').value || '0',
                    row.querySelector('.retiro-jose').value || '0',
                    row.querySelector('.retiro-alejandro').value || '0',
                    row.querySelector('.retiroTotal').textContent || '0',
                    row.querySelector('input[type="text"]').value || '',
                    row.querySelector('.totalAcumulado').textContent || '0'
                ]);
            });

            doc.autoTable({
                head: [headers],
                body: body,
                startY: 30,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 2 },
                columnStyles: {
                    0: { cellWidth: 25 },
                    5: { cellWidth: 45 }
                },
                margin: { top: 10, left: 14, right: 14 }
            });

            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(12);
            doc.text("Resumen:", 14, finalY);
            doc.setFontSize(10);
            doc.text(`Total Ingresado:       ${totalIngresadoEl.textContent}`, 14, finalY + 10);
            doc.text(`Total Retiro Jose:     ${totalRetiroJoseEl.textContent}`, 14, finalY + 18);
            doc.text(`Total Retiro Alejandro: ${totalRetiroAlejandroEl.textContent}`, 14, finalY + 26);
            doc.text(`Total Retiro Ambos:    ${totalRetiroAmbosEl.textContent}`, 14, finalY + 34);

            doc.save('registro-diario-' + new Date().toISOString().split('T')[0] + '.pdf');
        }

        // ────────────────────────────────────────────────
        // Eventos
        // ────────────────────────────────────────────────
        addRowBtn.addEventListener('click', () => {
            tableBody.appendChild(createEmptyRow());
            updateCalculations();
            saveToLocalStorage();
        });

        deleteAllBtn.addEventListener('click', () => {
            if (!confirm("¿Realmente quieres eliminar TODOS los registros?")) return;
            tableBody.innerHTML = '';
            localStorage.removeItem(STORAGE_KEY);
            updateCalculations();
        });

        exportPDFBtn.addEventListener('click', exportToPDF);

        // Inicio
        loadSavedData();

        // Si está vacío → agregar una fila inicial
        if (tableBody.children.length === 0) {
            tableBody.appendChild(createEmptyRow());
            updateCalculations();
            saveToLocalStorage();
        }

    </script>
</body>
</html>
